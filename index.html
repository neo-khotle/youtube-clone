<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Youtube</title>
</head>
<body>
    <div class="navbar"> 
        <div class="logo">
            <i class="material-icons">menu</i> <!--menu icon-->
            <img src="https://www.vectorlogo.zone/logos/youtube/youtube-ar21.svg" alt="Youtube Logo"> 
        </div>

        <div class="searchbar">
            <form class="search">
                <input type="text" placeholder="Search" name="search"/>
                <button><i class="material-icons">search</i></button>  <!-- looking glass -->
            </form>

            <i class="material-icons">mic_none</i> <!-- voice search -->
        </div>

        <div class="navigation-icons">
            <!--<button>--> <i class="material-icons">add</i> <!--Create</button><span>Create</span> -->  
            <i class="material-icons">notifications_none</i> <!--notifications bell icon-->
            <i class="material-icons">account_circle</i><!--google account icon--> 
        </div>
    </div>

    <div class="mainbody">
        <div class="categories">
            <div class="categories-section">
                <span class="category">
                    <i class="material-icons">home</i>
                    Home
                </span>
                <span class="category">
                    <i>S</i>
                    Shorts
                </span>
            </div>

            <div class="categories-section">
                
            </div>

            <div class="categories-section">
                
            </div>

            <div class="categories-section">
                
            </div>

            <div class="categories-section">
                
            </div>


        </div>


        <div class="videos"></div>
    </div>
</body>
</html>
